<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AppsVerge.com | Premium Domain</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
}

body{

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    Helvetica,
    Arial,
    sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    padding:40px;

    color:#111;

    /* animated soft gradient */
    background: linear-gradient(-45deg,#f8fafc,#ffffff,#f3f4f6,#ffffff);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;

}

/* DARK MODE */
@media (prefers-color-scheme: dark) {
    body{
        color:#f5f5f5;
        background: linear-gradient(-45deg,#0b0f17,#0f172a,#111827,#0b0f17);
    }

    .label{
        background:#111827;
        border-color:#1f2937;
        color:#9ca3af;
    }

    .email{
        color:#9ca3af;
    }

    .button{
        background:#ffffff;
        color:#000;
    }

    .button:hover{
        background:#e5e7eb;
    }
}

/* logo top-right */
.logo{
    position:fixed;
    top:22px;
    right:22px;
}

.logo img{
    width:44px;
    height:44px;
    border-radius:12px;
    object-fit:cover;
    border:1px solid rgba(0,0,0,0.08);
    background:white;
}

/* container */
.container{
    max-width:780px;
    animation:fade .8s ease;
}

/* badge */
.label{
    display:inline-block;
    padding:8px 16px;
    border:1px solid #e5e7eb;
    border-radius:999px;
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#6b7280;
    margin-bottom:30px;
    background:white;
}

/* domain with glow */
.domain{
    font-size:74px;
    font-weight:700;
    letter-spacing:-2px;
    line-height:1.05;
    margin-bottom:20px;
    word-break:break-word;

    /* soft premium glow */
    text-shadow: 0 10px 40px rgba(0,0,0,0.08);
}

.subtitle{
    font-size:26px;
    font-weight:500;
    color:#374151;
    margin-bottom:18px;
}

.description{
    font-size:18px;
    color:#6b7280;
    line-height:1.8;
    max-width:620px;
    margin:auto;
}

/* CTA button */
.button{
    display:inline-block;
    margin-top:48px;
    background:#111;
    color:white;
    text-decoration:none;
    padding:18px 34px;
    border-radius:14px;
    font-weight:600;
    transition:.25s ease;
}

.button:hover{
    transform:translateY(-2px);
    background:#000;
}

/* email */
.email{
    margin-top:16px;
    font-size:15px;
    color:#6b7280;
}

/* footer */
.footer{
    margin-top:60px;
    font-size:13px;
    color:#9ca3af;
}

/* animations */
@keyframes fade{
    from{
        opacity:0;
        transform:translateY(14px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* mobile */
@media(max-width:700px){

.domain{
    font-size:46px;
}

.subtitle{
    font-size:22px;
}

}

</style>

</head>

<body>

<!-- LOGO -->
<div class="logo">
    <img src="https://i.postimg.cc/63m8TwFx/Artboard-1-4x.png" alt="AppsVerge Logo">
</div>

<div class="container">

<div class="label">
Premium Domain
</div>

<h1 class="domain">
appsverge.com
</h1>

<div class="subtitle">
A premium domain for ambitious brands.
</div>

<p class="description">
A short, memorable and brandable domain ideal for modern startups,
AI products, SaaS platforms, and digital-first companies looking to build
a strong online identity.
</p>

<a class="button" href="mailto:info@appsverge.com">
✉ Contact Owner
</a>

<div class="email">
info@appsverge.com
</div>

<div class="footer">
Serious inquiries only.
</div>

</div>

</body>
</html>
